<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>6PM Film Showcase</title>
    <style>
      :root {
        --bg: #050505;
        --ink: #f2eee8;
        --ink-muted: rgba(242, 238, 232, 0.72);
        --edge-gap: 4px;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        padding: 0;
        background: var(--bg);
        color: var(--ink);
        font-family: "Avenir Next", "Segoe UI", Arial, sans-serif;
      }

      .top {
        margin: 0;
        padding: 10px 0 8px;
      }

      .top h1 {
        margin: 0;
        font-size: clamp(1.1rem, 2.1vw, 1.6rem);
        font-weight: 520;
        letter-spacing: 0.04em;
        text-transform: uppercase;
      }

      .top p {
        margin: 6px 0 0;
        font-size: 0.72rem;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        color: var(--ink-muted);
      }

      .stack {
        display: grid;
        gap: 0;
      }

      .full,
      .split {
        margin: 0;
      }

      .full img,
      .split img {
        display: block;
        width: 100%;
        height: clamp(320px, 72vh, 900px);
        object-fit: cover;
      }

      .split {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 0;
      }

      .bottom {
        margin: 0;
        padding: 10px 0 12px;
      }

      .bottom a {
        color: var(--ink);
        text-decoration: none;
        font-size: 0.7rem;
        letter-spacing: 0.11em;
        text-transform: uppercase;
        border-bottom: 1px solid currentColor;
        padding-bottom: 2px;
      }

      @media (max-width: 840px) {
        .split {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <header class="top">
      <h1>6PM Film Showcase</h1>
      <p>Selected campaign frames and visual studies.</p>
    </header>

    <main class="stack">
      <section class="full">
        <img
          src="https://picsum.photos/id/1011/2200/1400"
          alt="Film showcase placeholder landscape frame"
          loading="lazy"
        />
      </section>

      <section class="split">
        <img
          src="https://picsum.photos/id/1025/1500/1800"
          alt="Film showcase placeholder portrait frame left"
          loading="lazy"
        />
        <img
          src="https://picsum.photos/id/1038/1500/1800"
          alt="Film showcase placeholder portrait frame right"
          loading="lazy"
        />
      </section>

      <section class="full">
        <img
          src="https://picsum.photos/id/1043/2200/1400"
          alt="Film showcase placeholder wide frame"
          loading="lazy"
        />
      </section>

      <section class="split">
        <img
          src="https://picsum.photos/id/1050/1500/1800"
          alt="Film showcase placeholder detailed frame left"
          loading="lazy"
        />
        <img
          src="https://picsum.photos/id/1062/1500/1800"
          alt="Film showcase placeholder detailed frame right"
          loading="lazy"
        />
      </section>

      <section class="full">
        <img
          src="https://picsum.photos/id/1074/2200/1400"
          alt="Film showcase placeholder closing frame"
          loading="lazy"
        />
      </section>
    </main>

    <footer class="bottom">
      <a href="../index.html">Back to homepage</a>
    </footer>
  </body>
</html>
