<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PANTS</title>
    <style>
      :root {
        --bg: #050505;
        --ink: #f2eee8;
        --ink-muted: rgba(242, 238, 232, 0.72);
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        padding: 0;
        background: var(--bg);
        color: var(--ink);
        font-family: "Avenir Next", "Segoe UI", Arial, sans-serif;
      }

      .stack {
        display: grid;
        gap: 0;
      }

      .intro {
        padding: clamp(120px, 18vh, 230px) clamp(24px, 7vw, 120px)
          clamp(190px, 25vh, 340px);
      }

      .intro-inner {
        display: grid;
        grid-template-columns: minmax(100px, 150px) minmax(260px, 430px) minmax(320px, 1fr);
        column-gap: clamp(30px, 4.6vw, 86px);
        align-items: start;
        width: 100%;
        max-width: none;
      }

      .intro-label {
        margin: 0;
        font-size: 0.58rem;
        letter-spacing: 0.12em;
        text-transform: uppercase;
        color: var(--ink-muted);
        line-height: 1.35;
      }

      .intro-text {
        margin: 0;
        font-size: clamp(0.76rem, 0.82vw, 0.86rem);
        line-height: 1.45;
        letter-spacing: 0.01em;
        color: var(--ink);
        max-width: 410px;
      }

      .intro-tech {
        margin: 0;
        font-size: 0.64rem;
        line-height: 1.35;
        letter-spacing: 0.02em;
        color: rgba(242, 238, 232, 0.62);
        justify-self: end;
        width: min(440px, 100%);
        text-align: right;
      }

      .pants-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 6px;
        margin: 0;
      }

      .pants-grid img {
        display: block;
        width: 100%;
        height: auto;
      }

      .bottom {
        margin: 0;
        padding: 10px 0 12px;
      }

      .bottom a {
        color: var(--ink);
        text-decoration: none;
        font-size: 0.7rem;
        letter-spacing: 0.11em;
        text-transform: uppercase;
        border-bottom: 1px solid currentColor;
        padding-bottom: 2px;
      }

      @media (max-width: 900px) {
        .intro {
          padding: 90px 24px 132px;
        }

        .intro-inner {
          grid-template-columns: 1fr;
          row-gap: 12px;
          max-width: 460px;
        }

        .intro-tech {
          margin-top: 2px;
          justify-self: start;
          width: auto;
          text-align: left;
        }

        .pants-grid {
          grid-template-columns: 1fr;
          gap: 6px;
        }
      }
    </style>
  </head>
  <body>
    <main class="stack">
      <section class="intro">
        <div class="intro-inner">
          <p class="intro-label">PANTS — GARMENT</p>
          <p class="intro-text">
            A study of form, fit, and construction. Developed through pattern
            work and iteration, focusing on proportion, silhouette, and
            material behavior.
          </p>
          <p class="intro-tech">
            PATTERN DESIGN<br />
            GARMENT CONSTRUCTION<br />
            CLO3D
          </p>
        </div>
      </section>

      <section class="pants-grid">
        <img src="../assets/projects/pants/pants1.png" alt="Pants garment study front" loading="lazy" />
        <img src="../assets/projects/pants/pants2.jpg" alt="Pants garment study detail" loading="lazy" />
      </section>
    </main>

    <footer class="bottom">
      <a href="../index.html">Back</a>
    </footer>
  </body>
</html>
